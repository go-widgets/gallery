name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOWORK: "off"
  CGO_ENABLED: "0"

jobs:
  test:
    name: Native scene test + wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          check-latest: true
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Native scene test with coverage
        # main.go carries `//go:build js && wasm` so it drops out on
        # native; scene.go is tagless + gets 100 % of statements from
        # scene_test.go.
        run: go test -coverprofile=coverage.out ./...

      - name: Assert 100% statement coverage
        run: |
          total=$(go tool cover -func=coverage.out | awk 'END { gsub(/%/,"",$3); print $3 }')
          echo "total coverage: ${total}%"
          if [ "$(printf '%.0f' "$total")" != "100" ]; then
            echo "::error::coverage below 100% (got ${total}%)"
            go tool cover -func=coverage.out | grep -v "100.0%"
            exit 1
          fi

      - name: Wasm build smoke
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -o /tmp/gallery.wasm .
